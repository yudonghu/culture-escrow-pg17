services:

  # ── API (FastAPI + uvicorn) ──────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - pg17_output:/var/lib/pg17/output      # 生成的 PDF
      - pg17_logs:/var/log/pg17               # 审计日志
      - pg17_idem:/var/lib/pg17/idem          # 幂等 JSON
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      # HTTPS
      - "traefik.http.routers.pg17-api.rule=Host(`api.hydenluc.com`)"
      - "traefik.http.routers.pg17-api.entrypoints=websecure"
      - "traefik.http.routers.pg17-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.pg17-api.loadbalancer.server.port=8787"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.pg17-api-http.rule=Host(`api.hydenluc.com`)"
      - "traefik.http.routers.pg17-api-http.entrypoints=web"
      - "traefik.http.routers.pg17-api-http.middlewares=https-redirect"

  # ── Web (nginx serving static HTML) ─────────────────────────────────────────
  web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./apps/web:/usr/share/nginx/html:ro
      - ./apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      # HTTPS — portal.cultureescrow.com/pg17
      - "traefik.http.routers.pg17-web.rule=Host(`portal.cultureescrow.com`) && PathPrefix(`/pg17`)"
      - "traefik.http.routers.pg17-web.entrypoints=websecure"
      - "traefik.http.routers.pg17-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.pg17-web.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.pg17-web-http.rule=Host(`portal.cultureescrow.com`) && PathPrefix(`/pg17`)"
      - "traefik.http.routers.pg17-web-http.entrypoints=web"
      - "traefik.http.routers.pg17-web-http.middlewares=https-redirect"

networks:
  traefik_proxy:
    external: true

volumes:
  pg17_output:
  pg17_logs:
  pg17_idem:
